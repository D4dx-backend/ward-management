<!DOCTYPE html>
<html>
<head>
    <title>Test Report View</title>
</head>
<body>
    <h1>Test Report View</h1>
    <p>To test the report view functionality:</p>
    <ol>
        <li>Go to <a href="/admin/reports">/admin/reports</a></li>
        <li>Click on "View Details" for any report</li>
        <li>You should now see the detailed report view instead of a 404 error</li>
    </ol>
    
    <h2>API Test</h2>
    <button onclick="testAPI()">Test API Endpoint</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            
            try {
                // This will test if the API endpoint exists
                // Replace 'RESPONSE_ID' with an actual response ID from your database
                const response = await fetch('/api/responses/RESPONSE_ID');
                
                if (response.status === 404) {
                    resultDiv.innerHTML = '<p style="color: orange;">API endpoint exists but no test data found. This is expected.</p>';
                } else if (response.status === 401) {
                    resultDiv.innerHTML = '<p style="color: orange;">API endpoint exists but requires authentication. This is expected.</p>';
                } else if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = '<p style="color: green;">API endpoint working! Response data found.</p>';
                } else {
                    resultDiv.innerHTML = '<p style="color: red;">API endpoint error: ' + response.status + '</p>';
                }
            } catch (error) {
                resultDiv.innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
