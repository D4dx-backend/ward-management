name: Deploy to Cloudways

on:
  push:
    branches: [ server_prod ]  # Change to 'master' if needed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Generate token
      id: generate_token
      uses: tibdex/github-app-token@v1
      with:
        app_id: ${{ secrets.APP_ID }}
        private_key: ${{ secrets.APP_PRIVATE_KEY }}

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ steps.generate_token.outputs.token }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Next.js app
      run: npm run build

    - name: Deploy to Cloudways
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.CLOUDWAYS_HOST }}
        username: ${{ secrets.CLOUDWAYS_USER }}
        password: ${{ secrets.CLOUDWAYS_PASSWORD }}
        script: |
          cd /home/master/applications/${{ secrets.CLOUDWAYS_APP_PATH }}/public_html
          git pull https://x-access-token:${{ steps.generate_token.outputs.token }}@github.com/${{ github.repository }}.git main
          npm ci --production
          npm run build
          pm2 restart nextjs-app || pm2 start npm --name "nextjs-app" -- start