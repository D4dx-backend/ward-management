<!DOCTYPE html>
<html>
<head>
    <title>Test Document Download</title>
</head>
<body>
    <h1>Test Document Download</h1>
    <button onclick="testDownload()">Test Download</button>
    
    <script>
        async function testDownload() {
            try {
                // Replace 'DOCUMENT_ID' with an actual document ID from your database
                const response = await fetch('/api/documents/download/DOCUMENT_ID');
                
                if (!response.ok) {
                    console.error('Download failed:', response.status, response.statusText);
                    alert('Download failed: ' + response.status);
                    return;
                }
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'test-file.jpg';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                console.log('Download successful');
            } catch (error) {
                console.error('Download error:', error);
                alert('Download error: ' + error.message);
            }
        }
    </script>
</body>
</html>
